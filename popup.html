<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Booking Invoice</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 280px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; padding: 16px; }
  h1 { font-size: 1rem; color: #1a2d4a; margin-bottom: 4px; }
  .sub { font-size: 0.72rem; color: #9ca3af; margin-bottom: 14px; }
  .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; text-align: center; margin-bottom: 8px; }
  .btn-primary { background: #1a2d4a; color: #fff; }
  .btn-secondary { background: #f3f4f6; color: #1a2d4a; border: 1px solid #d1d5db; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .status { font-size: 0.72rem; color: #6b7280; text-align: center; min-height: 18px; margin-top: 6px; }
  .error { color: #dc2626; }
  .success { color: #059669; }
  .data-preview { background: #f9fafb; border-radius: 6px; padding: 8px 10px; font-size: 0.7rem; color: #6b7280; margin-top: 10px; max-height: 120px; overflow-y: auto; display: none; }
  .data-preview b { color: #374151; }
</style>
</head>
<body>

<h1>🧾 Booking Invoice</h1>
<p class="sub">Générer une facture depuis la page Booking</p>

<button id="scrape-btn" class="btn btn-primary">🔍 Analyser la page</button>
<button id="preview-btn" class="btn btn-secondary" disabled>👁️ Aperçu facture</button>

<div id="data-preview" class="data-preview"></div>
<div id="status" class="status"></div>

<script src="popup.js"></script>
</body>
</html>
